<!doctype html>
<html lang="no">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#9333ea" />
		<meta name="description" content="PikNik er ein interaktiv matlagingsapp der brukarar kan samarbeide i sanntid for å lage kreative oppskrifter." />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="PikNik" />
		<meta property="og:url" content="https://piknik.iverfinne.no/" />
		<meta property="og:title" content="PikNik | Kreativ matlagingsapp" />
		<meta property="og:description" content="PikNik er ein interaktiv matlagingsapp der brukarar kan samarbeide i sanntid for å lage kreative oppskrifter." />
		<meta property="og:image" content="https://piknik.iverfinne.no/og-image.png" />
		<meta property="og:image:width" content="1731" />
		<meta property="og:image:height" content="909" />
		<meta property="og:image:alt" content="PikNik – Oppskrifter saman." />
		<meta property="og:locale" content="nn_NO" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="PikNik | Kreativ matlagingsapp" />
		<meta name="twitter:description" content="PikNik er ein interaktiv matlagingsapp der brukarar kan samarbeide i sanntid for å lage kreative oppskrifter." />
		<meta name="twitter:image" content="https://piknik.iverfinne.no/og-image.png" />

		<link rel="icon" type="image/png" href="/favicon-48x48.png" sizes="48x48" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.json" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-shell">%sveltekit.body%</div>
		<script>document.addEventListener('gesturestart',function(e){e.preventDefault()});document.addEventListener('gesturechange',function(e){e.preventDefault()});document.addEventListener('gestureend',function(e){e.preventDefault()})</script>
	</body>
</html>
